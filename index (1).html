<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawday · Dog Day Planner · Toronto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EF;
    --bark: #2C1F14;
    --bark-light: #4A3728;
    --moss: #3D5A3E;
    --moss-light: #5A7F5B;
    --moss-pale: #E8F0E8;
    --amber: #C17F3A;
    --amber-pale: #FBF0E0;
    --slate: #5C6B7A;
    --slate-pale: #EDF0F3;
    --petal: #D4727A;
    --petal-pale: #FAEAEB;
    --border: rgba(44,31,20,0.1);
    --shadow: 0 4px 24px rgba(44,31,20,0.08);
    --shadow-lg: 0 12px 48px rgba(44,31,20,0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--bark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bark);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-paw {
    width: 32px;
    height: 32px;
    background: var(--moss);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: -0.02em;
  }

  .logo-text span { color: var(--amber); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .weather-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: rgba(247,244,239,0.85);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .weather-pill .temp { font-weight: 500; color: var(--cream); }

  /* ── LAYOUT ── */
  .app-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: white;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── FILTER BAR ── */
  .filter-section { margin-bottom: 20px; }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 10px;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: white;
    cursor: pointer;
    transition: all .18s;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--bark-light);
    font-weight: 400;
  }

  .filter-btn .ficon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all .18s;
  }

  .filter-btn.active { border-color: transparent; }

  .filter-btn[data-type="coffee_shop"].active { background: var(--amber-pale); border-color: var(--amber); color: var(--bark); }
  .filter-btn[data-type="coffee_shop"].active .ficon { background: var(--amber); }
  .filter-btn[data-type="dog_park"].active { background: var(--moss-pale); border-color: var(--moss); color: var(--bark); }
  .filter-btn[data-type="dog_park"].active .ficon { background: var(--moss); }
  .filter-btn[data-type="on_leash"].active { background: #EBF4F0; border-color: #2E8B6E; color: var(--bark); }
  .filter-btn[data-type="on_leash"].active .ficon { background: #2E8B6E; }
  .filter-btn[data-type="pet_store"].active { background: var(--petal-pale); border-color: var(--petal); color: var(--bark); }
  .filter-btn[data-type="pet_store"].active .ficon { background: var(--petal); }

  .filter-btn:not(.active) .ficon { background: var(--slate-pale); }
  .filter-btn:not(.active):hover { border-color: var(--bark-light); background: var(--cream); }

  /* ── ROUTE BUILDER ── */
  .build-btn {
    width: 100%;
    padding: 14px;
    background: var(--bark);
    color: var(--cream);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all .18s;
    margin-bottom: 20px;
  }

  .build-btn:hover { background: var(--bark-light); transform: translateY(-1px); }
  .build-btn:active { transform: translateY(0); }
  .build-btn svg { width: 16px; height: 16px; }

  /* ── ROUTE SUMMARY ── */
  .route-summary {
    background: var(--moss-pale);
    border: 1px solid rgba(61,90,62,0.2);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 20px;
    display: none;
  }

  .route-summary.visible { display: block; }

  .route-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--moss);
    font-family: 'Playfair Display', serif;
  }

  .stat-label {
    font-size: 11px;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .weather-info {
    background: white;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weather-icon { font-size: 24px; }

  .weather-details { flex: 1; }

  .weather-temp {
    font-size: 16px;
    font-weight: 500;
    color: var(--bark);
  }

  .weather-desc {
    font-size: 12px;
    color: var(--slate);
    margin-top: 1px;
  }

  .weather-extra {
    font-size: 11px;
    color: var(--slate);
    text-align: right;
  }

  /* ── PLACE CARDS ── */
  .stops-section { margin-bottom: 20px; }

  .stop-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
    background: white;
    cursor: pointer;
    transition: all .18s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    position: relative;
  }

  .stop-card:hover { border-color: var(--moss); box-shadow: var(--shadow); }
  .stop-card.selected { border-color: var(--moss); background: var(--moss-pale); }

  .stop-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--moss);
    color: white;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .stop-body { flex: 1; min-width: 0; }

  .stop-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--bark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stop-meta {
    font-size: 12px;
    color: var(--slate);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .stop-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .badge-coffee { background: var(--amber-pale); color: var(--amber); }
  .badge-dog_park { background: var(--moss-pale); color: var(--moss); }
  .badge-on_leash { background: #EBF4F0; color: #2E8B6E; }
  .badge-pet_store { background: var(--petal-pale); color: var(--petal); }

  .stop-rating { color: var(--amber); font-size: 11px; }

  .stop-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--slate-pale);
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--slate);
    transition: all .15s;
  }

  .stop-card:hover .stop-remove { display: flex; }
  .stop-remove:hover { background: var(--petal-pale); color: var(--petal); }

  /* ── PLACES LIST ── */
  .places-list { }

  .place-item {
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all .15s;
    background: white;
  }

  .place-item:hover { border-color: var(--moss); background: var(--moss-pale); }

  .place-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .pi-coffee_shop { background: var(--amber-pale); }
  .pi-dog_park { background: var(--moss-pale); }
  .pi-on_leash { background: #EBF4F0; }
  .pi-pet_store { background: var(--petal-pale); }

  .place-info { flex: 1; min-width: 0; }

  .place-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--bark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .place-addr {
    font-size: 11px;
    color: var(--slate);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .place-add-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--moss);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    flex-shrink: 0;
    transition: all .15s;
  }

  .place-add-btn:hover { background: var(--moss-light); transform: scale(1.1); }

  /* ── MAP ── */
  .map-container {
    position: relative;
    background: #E8EAD4;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* loading overlay */
  .map-loading {
    position: absolute;
    inset: 0;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }

  .map-loading-paw {
    font-size: 40px;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .map-loading p {
    font-size: 14px;
    color: var(--slate);
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* map info box */
  .map-info-box {
    position: absolute;
    bottom: 24px;
    right: 24px;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 16px;
    width: 260px;
    display: none;
    z-index: 10;
    animation: slideUp .25s ease;
  }

  .map-info-box.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--bark);
  }

  .info-addr { font-size: 12px; color: var(--slate); margin-bottom: 10px; }

  .info-add-btn {
    width: 100%;
    padding: 8px;
    background: var(--moss);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }

  .info-add-btn:hover { background: var(--moss-light); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bark);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    transition: transform .3s ease;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SHARE BUTTON ── */
  .share-btn {
    background: var(--amber);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all .15s;
  }

  .share-btn:hover { background: #A86E2E; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 28px 16px;
    color: var(--slate);
  }

  .empty-state .e-icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.5; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .app-layout { grid-template-columns: 1fr; grid-template-rows: auto 320px; height: auto; }
    .sidebar { height: auto; max-height: 65vh; overflow: hidden; }
    .map-container { height: 320px; }
    .map-info-box { width: calc(100% - 32px); right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-paw">🐾</div>
    <div class="logo-text">Paw<span>day</span></div>
  </div>
  <div class="header-right">
    <div class="weather-pill" onclick="refreshWeather()">
      <span id="header-weather-icon">🌤</span>
      <span class="temp" id="header-temp">--°C</span>
      <span id="header-weather-desc">Toronto</span>
    </div>
    <button class="share-btn" onclick="shareRoute()">
      <svg viewBox="0 0 16 16" fill="none" width="13" height="13">
        <path d="M11 2.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zm0 6a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 6.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zm8-2.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm0 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2zM3 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill="white"/>
        <line x1="4" y1="9" x2="10" y2="6.5" stroke="white" stroke-width="1.5"/>
        <line x1="4" y1="10" x2="10" y2="12.5" stroke="white" stroke-width="1.5"/>
      </svg>
      Share with GF
    </button>
  </div>
</header>

<div class="app-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-scroll">

      <!-- Filters -->
      <div class="filter-section">
        <div class="section-title">What do you want to include?</div>
        <div class="filter-grid">
          <button class="filter-btn active" data-type="coffee_shop" onclick="toggleFilter(this)">
            <div class="ficon">☕</div>
            Coffee shops
          </button>
          <button class="filter-btn active" data-type="dog_park" onclick="toggleFilter(this)">
            <div class="ficon">🏃</div>
            Dog parks
          </button>
          <button class="filter-btn active" data-type="on_leash" onclick="toggleFilter(this)">
            <div class="ficon">🌿</div>
            On-leash parks
          </button>
          <button class="filter-btn active" data-type="pet_store" onclick="toggleFilter(this)">
            <div class="ficon">🛍</div>
            Pet stores
          </button>
        </div>
      </div>

      <!-- Build Route button -->
      <button class="build-btn" onclick="buildRoute()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l1.5 4.5H15l-4.5 3 1.5 4.5L8 10.5 4 13l1.5-4.5L1 5.5h5.5z"/></svg>
        Build my route
      </button>

      <!-- Route summary -->
      <div class="route-summary" id="route-summary">
        <div class="route-stats">
          <div class="stat">
            <div class="stat-val" id="stat-km">0 km</div>
            <div class="stat-label">Total walk</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-stops">0</div>
            <div class="stat-label">Stops</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-time">0 hrs</div>
            <div class="stat-label">Est. time</div>
          </div>
        </div>
        <div class="weather-info">
          <div class="weather-icon" id="w-icon">🌤</div>
          <div class="weather-details">
            <div class="weather-temp" id="w-temp">Loading...</div>
            <div class="weather-desc" id="w-desc">Toronto weather</div>
          </div>
          <div class="weather-extra" id="w-extra"></div>
        </div>
      </div>

      <!-- Selected stops -->
      <div class="stops-section" id="stops-section" style="display:none">
        <div class="section-title">Your route <span id="stop-count" style="color:var(--moss)"></span></div>
        <div id="stops-list"></div>
      </div>

      <!-- Available places -->
      <div id="places-section">
        <div class="section-title">Available nearby spots</div>
        <div id="places-list">
          <div class="empty-state">
            <div class="e-icon">🗺</div>
            <p>Toggle the filters above and tap "Build my route" to discover spots near Sherbourne Station.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div class="map-loading" id="map-loading">
      <div class="map-loading-paw">🐾</div>
      <p>Loading map...</p>
    </div>
    <div id="map"></div>
    <div class="map-info-box" id="map-info-box">
      <div class="info-title" id="info-name"></div>
      <div class="info-addr" id="info-addr"></div>
      <button class="info-add-btn" id="info-add-btn">+ Add to route</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

  { id: 'rosedale_ravine', name: 'Rosedale Ravine Park', type: 'on_leash', addr: 'Bloor & Sherbourne', rating: 4.5, lat: 43.6727, lng: -79.3751, note: 'Starts at Sherbourne Station exit. Forested ravine, leashed trail.' },
  { id: 'milkman', name: "Milkman's Lane Trail", type: 'on_leash', addr: "Milkman's Lane, Rosedale", rating: 4.8, lat: 43.6776, lng: -79.3740, note: 'Hidden historic trail into the Don Valley. Magical in every season.' },
  { id: 'riverdale_w', name: 'Riverdale Park West', type: 'on_leash', addr: '375 Sumach St', rating: 4.7, lat: 43.6657, lng: -79.3589, note: 'Best skyline view in the east end. Dog water fountain.' },
  { id: 'riverdale_e', name: 'Riverdale Park East', type: 'on_leash', addr: '550 Broadview Ave', rating: 4.8, lat: 43.6718, lng: -79.3550, note: 'Panoramic city views. Perfect for sunset walks.' },
  { id: 'brickworks_park', name: 'Don Valley Brick Works Park', type: 'on_leash', addr: '550 Bayview Ave', rating: 4.7, lat: 43.6858, lng: -79.3664, note: 'Ponds, turtles, boardwalks. Your schnauzer will go wild.' },

  // Pet stores
  { id: 'happypets', name: 'HappyPets Pantry', type: 'pet_store', addr: '563 Sherbourne St', rating: 4.9, lat: 43.6696, lng: -79.3755, note: 'Right on your doorstep. Boutique with grooming too.' },
  { id: 'beastiary', name: 'The Beastiary Pet Shop', type: 'pet_store', addr: '570 Parliament St', rating: 4.8, lat: 43.6675, lng: -79.3695, note: 'Indie pet store in Cabbagetown. Great treats and accessories.' },
  { id: 'pet_cuisine', name: 'Pet Cuisine & Accessories', type: 'pet_store', addr: '127 Front St E', rating: 4.8, lat: 43.6498, lng: -79.3699, note: 'Great selection, grooming on-site. A bit south but worth it.' },
];

const TYPE_META = {
  coffee_shop: { icon: '☕', label: 'Coffee', color: '#C17F3A', markerColor: '#C17F3A' },
  dog_park:    { icon: '🏃', label: 'Dog park', color: '#3D5A3E', markerColor: '#3D5A3E' },
  on_leash:    { icon: '🌿', label: 'On-leash', color: '#2E8B6E', markerColor: '#2E8B6E' },
  pet_store:   { icon: '🛍', label: 'Pet store', color: '#D4727A', markerColor: '#D4727A' },
};

// State
let map, directionsService, directionsRenderer;
let markers = {};
let selectedStops = [];
let activeFilters = new Set(['coffee_shop','dog_park','on_leash','pet_store']);
let weatherData = null;
let infoPlace = null;

// ── WEATHER (Open-Meteo, free, no key) ────────────────────────────────
async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${SHERBOURNE.lat}&longitude=${SHERBOURNE.lng}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&timezone=America%2FToronto`;
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    weatherData = {
      temp: Math.round(c.temperature_2m),
      code: c.weather_code,
      wind: Math.round(c.wind_speed_10m),
      humidity: c.relative_humidity_2m,
    };
    updateWeatherUI();
  } catch(e) {
    console.log('Weather unavailable');
  }
}

function weatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤';
  if (code <= 3) return '☁️';
  if (code <= 48) return '🌫';
  if (code <= 57) return '🌧';
  if (code <= 67) return '🌧';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦';
  if (code <= 86) return '❄️';
  if (code <= 99) return '⛈';
  return '🌤';
}

function weatherDesc(code) {
  if (code === 0) return 'Clear skies — perfect walk!';
  if (code <= 2) return 'Mostly sunny — great day!';
  if (code <= 3) return 'Cloudy — still good for a walk';
  if (code <= 48) return 'Foggy — watch your step on trails';
  if (code <= 57) return 'Light drizzle — bring a raincoat';
  if (code <= 67) return 'Rainy — maybe a shorter route today';
  if (code <= 77) return 'Snowy — bundle up!';
  if (code <= 82) return 'Rain showers — quick trips only';
  return 'Stormy — indoor day?';
}

function updateWeatherUI() {
  if (!weatherData) return;
  const icon = weatherIcon(weatherData.code);
  const desc = weatherDesc(weatherData.code);
  document.getElementById('header-temp').textContent = weatherData.temp + '°C';
  document.getElementById('header-weather-icon').textContent = icon;
  document.getElementById('header-weather-desc').textContent = desc.split('—')[0].trim();
  document.getElementById('w-icon').textContent = icon;
  document.getElementById('w-temp').textContent = weatherData.temp + '°C in Toronto';
  document.getElementById('w-desc').textContent = desc;
  document.getElementById('w-extra').innerHTML = `💨 ${weatherData.wind} km/h<br>💧 ${weatherData.humidity}%`;
}

function refreshWeather() { fetchWeather(); showToast('Refreshing weather...'); }

// ── FILTERS ───────────────────────────────────────────────────────────
function toggleFilter(btn) {
  const type = btn.dataset.type;
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  updateMarkerVisibility();
}

// ── MAP INIT ──────────────────────────────────────────────────────────
function initMap() {
  document.getElementById('map-loading').style.display = 'none';

  map = new google.maps.Map(document.getElementById('map'), {
    center: SHERBOURNE,
    zoom: 14,
    mapId: 'pawday_map',
    disableDefaultUI: false,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { featureType: 'all', elementType: 'geometry', stylers: [{ saturation: -20 }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#d4e6ef' }] },
      { featureType: 'landscape.natural', elementType: 'geometry', stylers: [{ color: '#e8eddf' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#d6e8c8' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#f5f0e8' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#e0d8cc' }] },
    ],
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers: true,
    polylineOptions: { strokeColor: '#3D5A3E', strokeWeight: 4, strokeOpacity: 0.8 }
  });
  directionsRenderer.setMap(map);

  // Home marker
  new google.maps.Marker({
    position: SHERBOURNE,
    map,
    title: 'Sherbourne Station',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#2C1F14',
      fillOpacity: 1,
      strokeColor: 'white',
      strokeWeight: 2.5,
    },
    zIndex: 100,
  });

  // Place markers
  ALL_PLACES.forEach(p => {
    const meta = TYPE_META[p.type];
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map,
      title: p.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: meta.markerColor,
        fillOpacity: 0.85,
        strokeColor: 'white',
        strokeWeight: 2,
      },
    });

    marker.addListener('click', () => showPlaceInfo(p));
    markers[p.id] = marker;
  });

  // Load initial places list
  renderPlacesList();
  fetchWeather();
}

function updateMarkerVisibility() {
  ALL_PLACES.forEach(p => {
    if (markers[p.id]) {
      markers[p.id].setVisible(activeFilters.has(p.type));
    }
  });
  renderPlacesList();
}

// ── PLACE INFO POPUP ──────────────────────────────────────────────────
function showPlaceInfo(place) {
  infoPlace = place;
  document.getElementById('info-name').textContent = place.name;
  document.getElementById('info-addr').textContent = place.addr + ' · ' + place.note;
  document.getElementById('info-add-btn').textContent = selectedStops.find(s => s.id === place.id)
    ? '✓ Already in route' : '+ Add to route';
  document.getElementById('info-add-btn').onclick = () => addStop(place);
  document.getElementById('map-info-box').classList.add('visible');
}

map?.addListener('click', () => {
  document.getElementById('map-info-box').classList.remove('visible');
});

// ── PLACES LIST ───────────────────────────────────────────────────────
function renderPlacesList() {
  const filtered = ALL_PLACES.filter(p => activeFilters.has(p.type));
  const container = document.getElementById('places-list');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><p>Enable at least one filter to see nearby spots.</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(p => {
    const meta = TYPE_META[p.type];
    const added = selectedStops.find(s => s.id === p.id);
    return `
      <div class="place-item" onclick="panTo(${p.lat}, ${p.lng}, '${p.id}')">
        <div class="place-icon pi-${p.type}">${meta.icon}</div>
        <div class="place-info">
          <div class="place-name">${p.name}</div>
          <div class="place-addr">★ ${p.rating} · ${p.addr}</div>
        </div>
        <button class="place-add-btn" onclick="event.stopPropagation(); addStop(ALL_PLACES.find(x=>x.id==='${p.id}'))" title="Add to route"
          style="${added ? 'background:var(--moss-light);' : ''}">
          ${added ? '✓' : '+'}
        </button>
      </div>
    `;
  }).join('');
}

function panTo(lat, lng, id) {
  map.panTo({ lat, lng });
  map.setZoom(15);
  const place = ALL_PLACES.find(p => p.id === id);
  if (place) showPlaceInfo(place);
}

// ── ROUTE BUILDING ────────────────────────────────────────────────────
function toggleFilter(btn) {
  const type = btn.dataset.type;
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  updateMarkerVisibility();
}

function buildRoute() {
  const filtered = ALL_PLACES.filter(p => activeFilters.has(p.type));
  if (filtered.length === 0) { showToast('Enable at least one filter first!'); return; }

  // Smart selection: pick 1 of each active type, prefer high rating, order by proximity
  const picked = [];
  activeFilters.forEach(type => {
    const candidates = filtered.filter(p => p.type === type).sort((a,b) => b.rating - a.rating);
    if (candidates.length) picked.push(candidates[0]);
  });

  // Sort by rough distance from Sherbourne
  picked.sort((a,b) => {
    const da = Math.hypot(a.lat - SHERBOURNE.lat, a.lng - SHERBOURNE.lng);
    const db = Math.hypot(b.lat - SHERBOURNE.lat, b.lng - SHERBOURNE.lng);
    return da - db;
  });

  selectedStops = picked;
  renderStops();
  drawRoute();
  renderPlacesList();
  showToast('Route built! Tap stops to swap them.');
}

function addStop(place) {
  if (!place) return;
  if (selectedStops.find(s => s.id === place.id)) { showToast('Already in your route!'); return; }
  selectedStops.push(place);
  renderStops();
  drawRoute();
  renderPlacesList();
  document.getElementById('map-info-box').classList.remove('visible');
  showToast(`${place.name} added!`);
}

function removeStop(id) {
  selectedStops = selectedStops.filter(s => s.id !== id);
  renderStops();
  drawRoute();
  renderPlacesList();
}

function renderStops() {
  const section = document.getElementById('stops-section');
  const list = document.getElementById('stops-list');
  const count = document.getElementById('stop-count');

  if (selectedStops.length === 0) {
    section.style.display = 'none';
    document.getElementById('route-summary').classList.remove('visible');
    return;
  }

  section.style.display = 'block';
  count.textContent = `(${selectedStops.length})`;

  list.innerHTML = selectedStops.map((s, i) => {
    const meta = TYPE_META[s.type];
    return `
      <div class="stop-card">
        <div class="stop-num">${i + 1}</div>
        <div class="stop-body">
          <div class="stop-name">${s.name}</div>
          <div class="stop-meta">
            <span class="stop-badge badge-${s.type}">${meta.icon} ${meta.label}</span>
            <span class="stop-rating">★ ${s.rating}</span>
          </div>
          <div style="font-size:11px;color:var(--slate);margin-top:4px;">${s.note}</div>
        </div>
        <button class="stop-remove" onclick="removeStop('${s.id}')">✕</button>
      </div>
    `;
  }).join('');
}

// ── DIRECTIONS + DISTANCE ─────────────────────────────────────────────
function drawRoute() {
  if (selectedStops.length === 0) {
    directionsRenderer.setDirections({ routes: [] });
    document.getElementById('route-summary').classList.remove('visible');
    return;
  }

  const waypoints = selectedStops.slice(0, -1).map(s => ({
    location: new google.maps.LatLng(s.lat, s.lng),
    stopover: true,
  }));

  const last = selectedStops[selectedStops.length - 1];

  const req = {
    origin: new google.maps.LatLng(SHERBOURNE.lat, SHERBOURNE.lng),
    destination: new google.maps.LatLng(last.lat, last.lng),
    waypoints,
    travelMode: google.maps.TravelMode.WALKING,
    optimizeWaypoints: false,
  };

  directionsService.route(req, (result, status) => {
    if (status === 'OK') {
      directionsRenderer.setDirections(result);
      const legs = result.routes[0].legs;
      const totalMeters = legs.reduce((sum, l) => sum + l.distance.value, 0);
      const totalKm = (totalMeters / 1000).toFixed(1);
      const totalMins = legs.reduce((sum, l) => sum + l.duration.value, 0) / 60;
      const estTime = Math.round(totalMins + selectedStops.length * 30); // +30min per stop
      const hrs = (estTime / 60).toFixed(1);

      document.getElementById('stat-km').textContent = totalKm + ' km';
      document.getElementById('stat-stops').textContent = selectedStops.length;
      document.getElementById('stat-time').textContent = hrs + ' hrs';
      document.getElementById('route-summary').classList.add('visible');
      updateWeatherUI();
    } else {
      // Fallback distance estimate
      let totalKm = 0;
      let prev = SHERBOURNE;
      selectedStops.forEach(s => {
        totalKm += Math.hypot(s.lat - prev.lat, s.lng - prev.lng) * 111;
        prev = { lat: s.lat, lng: s.lng };
      });
      document.getElementById('stat-km').textContent = totalKm.toFixed(1) + ' km';
      document.getElementById('stat-stops').textContent = selectedStops.length;
      document.getElementById('stat-time').textContent = ((totalKm / 4.5 + selectedStops.length * 0.5)).toFixed(1) + ' hrs';
      document.getElementById('route-summary').classList.add('visible');
      updateWeatherUI();
    }
  });
}

// ── SHARE ─────────────────────────────────────────────────────────────
function shareRoute() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: 'Our dog day route 🐾',
      text: `Hey! I planned us a dog day out in Toronto — check this out 🐾`,
      url,
    });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied! Send it to her 💌'));
  } else {
    showToast('Copy this URL to share: ' + url);
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close info box on map click (after map loads)
window.onMapReady = function() {
  map.addListener('click', () => {
    document.getElementById('map-info-box').classList.remove('visible');
  });
};
</script>
